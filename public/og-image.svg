<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="60%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#4d96ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4d96ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff6b6b"/>
      <stop offset="25%"  stop-color="#ffd93d"/>
      <stop offset="50%"  stop-color="#6bcb77"/>
      <stop offset="75%"  stop-color="#4d96ff"/>
      <stop offset="100%" stop-color="#c77dff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid lines (like PCB traces) -->
  <g stroke="#a855f7" stroke-opacity="0.06" stroke-width="1" fill="none">
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="510" x2="1200" y2="510"/>
    <line x1="80" y1="0" x2="80" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/>
  </g>

  <!-- Corner markers -->
  <g fill="#a855f7" fill-opacity="0.35">
    <circle cx="80" cy="120" r="4"/>
    <circle cx="1120" cy="120" r="4"/>
    <circle cx="80" cy="510" r="4"/>
    <circle cx="1120" cy="510" r="4"/>
  </g>

  <!-- Label -->
  <text x="80" y="175" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="22" font-weight="700" letter-spacing="5" fill="url(#rainbow)">
    FIELD NOTES FROM THE GARAGE
  </text>

  <!-- Main wordmark -->
  <text x="80" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="96" font-weight="800" fill="#ffffff" letter-spacing="-2">
    Electronic<tspan fill="url(#rainbow)">Zoology</tspan>
  </text>

  <!-- Subtitle -->
  <text x="80" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="28" font-weight="400" fill="#aaaaaa">
    Studying the strange creatures of the electronic wilderness
  </text>

  <!-- Bottom row: badges -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20">
    <!-- Location badge -->
    <g transform="translate(80, 490)">
      <rect x="0" y="0" width="280" height="44" rx="22" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.12"/>
      <circle cx="24" cy="22" r="5" fill="#a855f7"/>
      <text x="44" y="29" fill="#cccccc">Bellarine Peninsula, VIC</text>
    </g>

    <!-- Operation badge -->
    <g transform="translate(380, 490)">
      <rect x="0" y="0" width="270" height="44" rx="22" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.12"/>
      <circle cx="24" cy="22" r="5" fill="#2ecc71"/>
      <text x="44" y="29" fill="#cccccc">Garage-based operation</text>
    </g>

    <!-- Hardware badge -->
    <g transform="translate(670, 490)">
      <rect x="0" y="0" width="240" height="44" rx="22" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.12"/>
      <circle cx="24" cy="22" r="5" fill="#a855f7"/>
      <text x="44" y="29" fill="#cccccc">ESP32 · Pi · Salvage</text>
    </g>
  </g>

  <!-- Byline, right-aligned -->
  <text x="1120" y="580" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="18" font-weight="400" fill="#888888" letter-spacing="1">
    by The Tech-ologist
  </text>
</svg>
